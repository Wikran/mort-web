<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MORT DOS App</title>

  <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
  <link rel="stylesheet" href="https://js-dos.com/6.22/current/js-dos.css">

  <style>
    body {
      margin: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      width: 100%;
      max-width: 900px;
      height: 600px;
      border: 2px solid #444;
      background-color: #000;
    }
  </style>
</head>

<body>
  <canvas id="dos"></canvas>

  <script>
    Dos(document.getElementById("dos"), {
      wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js",
    }).ready((fs, main) => {

      fs.extract("MORT.zip").then(() => {

        // ให้ DOSBox ตั้งค่าระบบก่อน 1.5 วินาที
        setTimeout(() => {

          // รันคำสั่ง DOS แบบชัดเจน
          main([
            "-c", "mount c .",
            "-c", "c:",
            "-c", "cd MORT",
            "-c", "MORT.exe"
          ]);

        }, 1500);

      });
    });
  </script>
</body>
</html>
