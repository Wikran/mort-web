<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MORT DOS App</title>

  <!-- โหลด js-dos -->
  <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
  <link rel="stylesheet" href="https://js-dos.com/6.22/current/js-dos.css">

  <style>
    body {
      margin: 0;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      width: 100%;
      max-width: 900px;
      height: 600px;
      border: 2px solid #444;
      background-color: #000;
    }
  </style>
</head>

<body>
  <!-- ใช้ canvas แทน div -->
  <canvas id="dos"></canvas>

  <script>
    Dos(document.getElementById("dos"), {
      wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js",
    }).ready((fs, main) => {
      // โหลดไฟล์ ZIP และรันโปรแกรม MORT.exe
      fs.extract("MORT.zip").then(() => {
        main(["MORT/MORT.exe"]);
      });
    });
  </script>
</body>
</html>
